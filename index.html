<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Mes Listes</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f2f2f7" id="meta-theme">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mes Listes">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="stylesheet" href="styles.css">

<!-- Le thème est posé avant le premier rendu : appliqué depuis app.js, l'écran
     apparaîtrait un instant dans les mauvaises couleurs. -->
<script>
  try {
    var reglages = JSON.parse(localStorage.getItem('meslistes.v1') || '{}');
    var choix = reglages.theme || 'auto';
    if (choix === 'auto') {
      choix = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.dataset.theme = choix;
    if (reglages.accent) {
      document.documentElement.style.setProperty('--accent', reglages.accent);
    }
    document.querySelector('#meta-theme').content = choix === 'dark' ? '#000000' : '#f2f2f7';
  } catch (e) {}
</script>
</head>
<body>

<!-- ========== ÉCRAN 1 : LES LISTES ========== -->
<section id="screen-home" class="screen is-active">
  <header class="topbar">
    <h1>Mes listes</h1>
    <div class="topbar-actions">
      <button class="icon-btn" id="btn-settings" aria-label="Réglages">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
      </button>
    </div>
  </header>

  <div class="notice" id="backup-notice" hidden>
    <span id="backup-notice-text"></span>
    <button class="link-btn" id="backup-notice-go">Sauvegarder</button>
    <button class="notice-close" id="backup-notice-close" aria-label="Masquer">×</button>
  </div>

  <main class="scroll">
    <ul id="lists" class="lists"></ul>

    <div id="empty-lists" class="empty">
      <p>
        Aucune liste pour l'instant.<br>
        Appuie sur <strong>+</strong> pour en créer une.
      </p>
      <button class="ghost-btn" id="btn-restore">Restaurer depuis Fichiers ou iCloud…</button>
    </div>
  </main>

  <button class="fab" id="btn-new-list" aria-label="Nouvelle liste">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</section>

<!-- ========== ÉCRAN 2 : LES ARTICLES ========== -->
<section id="screen-list" class="screen">
  <header class="topbar">
    <button class="icon-btn" id="btn-back" aria-label="Retour">
      <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <h1 id="list-title">Liste</h1>
    <div class="topbar-actions">
      <button class="icon-btn" id="btn-list-menu" aria-label="Options de la liste">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
      </button>
    </div>
  </header>

  <div class="subbar">
    <span id="list-progress">0 sur 0</span>
    <button class="link-btn" id="btn-toggle-done">Masquer les cochés</button>
  </div>

  <main class="scroll">
    <ul id="items" class="items"></ul>

    <p id="empty-items" class="empty">
      Cette liste est vide.<br>
      Ajoute un article ci-dessous, puis touche son nom pour choisir
      la quantité ou lui ajouter des variantes.
    </p>
  </main>

  <form class="composer" id="form-add-item">
    <input type="text" id="input-item" placeholder="Ajouter un article…"
           autocomplete="off" autocapitalize="sentences" enterkeyhint="done">
    <button type="submit" class="composer-btn" aria-label="Ajouter">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </form>
</section>

<!-- ========== FEUILLE D'ACTIONS ========== -->
<div class="sheet-backdrop" id="sheet-backdrop" hidden>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <div class="sheet-grabber"></div>
    <h2 class="sheet-title" id="sheet-title"></h2>
    <div id="sheet-body"></div>
    <button class="sheet-action sheet-cancel" id="sheet-cancel">Annuler</button>
  </div>
</div>

<!-- ========== BOÎTE DE SAISIE (nom d'une liste) ========== -->
<div class="modal-backdrop" id="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <h2 id="modal-title"></h2>
    <input type="text" id="modal-input" autocomplete="off" enterkeyhint="done">
    <div class="modal-buttons">
      <button class="modal-btn" id="modal-cancel">Annuler</button>
      <button class="modal-btn primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<!-- ========== FICHE D'UN ARTICLE ========== -->
<div class="modal-backdrop" id="item-backdrop" hidden>
  <div class="modal modal-item" id="item-editor" role="dialog" aria-modal="true">
    <h2>Modifier l'article</h2>

    <div class="modal-scroll">
      <label class="modal-label" for="item-name">Article</label>
      <input type="text" id="item-name" autocomplete="off" enterkeyhint="done">

      <div id="item-qty-block">
        <label class="modal-label" for="item-qty">Quantité</label>
        <div class="stepper">
          <button type="button" class="step" data-step="-1" aria-label="Diminuer">−</button>
          <input type="text" id="item-qty" class="step-value" inputmode="numeric" aria-label="Quantité">
          <button type="button" class="step" data-step="1" aria-label="Augmenter">+</button>
        </div>
      </div>

      <label class="modal-label">Variantes</label>
      <ul class="variants-edit" id="item-variants"></ul>
      <button type="button" class="add-variant" id="btn-add-variant">+ Ajouter une variante</button>
    </div>

    <div class="modal-buttons">
      <button class="modal-btn" id="item-cancel">Annuler</button>
      <button class="modal-btn primary" id="item-ok">OK</button>
    </div>
  </div>
</div>

<!-- ========== NOTIFICATION ========== -->
<div class="toast" id="toast" hidden>
  <span id="toast-text"></span>
  <button id="toast-undo">Annuler</button>
</div>

<script src="app.js"></script>
</body>
</html>
